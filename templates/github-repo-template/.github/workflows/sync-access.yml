name: Sync access list

on:
  push:
    branches: [main]
    paths: [access.yaml]

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -q pyyaml requests
      - run: python .github/scripts/sync_access.py
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_APP_ID: ${{ secrets.CLOUDFLARE_APP_ID }}
          CLOUDFLARE_POLICY_ID: ${{ secrets.CLOUDFLARE_POLICY_ID }}
